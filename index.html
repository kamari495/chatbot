<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabbit Chat 🐰🥕</title>
    <style>
        /* Paleta Estilo Pastel / Kawaii Bunny */
        :root {
            --bunny-bg: #fdf2f5; 
            --bunny-panel: #ffffff; 
            --bunny-header: #ffb7c5; 
            --bunny-accent: #ffd1dc; 
            --bunny-text: #5d4a4a; 
            --bunny-bot-bubble: #fff0f5; 
            --bunny-user-bubble: #ff9aa2;
            --bunny-button: #ff9aa2; 
            --bunny-border: #fce4ec;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif; 
            background-color: var(--bunny-bg); 
            color: var(--bunny-text);
            margin: 0; 
            display: flex; 
            justify-content: center;
            align-items: center;
            height: 100vh; 
        }

        /* Contenedor principal redondeado */
        #chat-container {
            flex: none;
            display: flex;
            flex-direction: column;
            width: 95%;
            max-width: 800px;
            height: 85vh;
            background-color: var(--bunny-panel);
            border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(255, 183, 197, 0.3);
            overflow: hidden;
            border: 4px solid white;
        }

        /* Cabecera con estilo de conejo */
        header {
            background-color: var(--bunny-header);
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            letter-spacing: 1px;
            border-bottom: none;
        }

        header::before, header::after {
            content: '🐰';
            margin: 0 10px;
        }

        /* Área de mensajes */
        #chat-window {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: radial-gradient(#fff5f7 2px, transparent 2px);
            background-size: 20px 20px;
        }

        .message {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 20px;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 0.95rem;
            border: 2px solid var(--bunny-border);
        }

        .user-msg {
            align-self: flex-end;
            background-color: var(--bunny-user-bubble);
            color: white;
            border-bottom-right-radius: 5px;
            border-color: #ffb7c5;
        }

        .bot-msg {
            align-self: flex-start;
            background-color: var(--bunny-bot-bubble);
            color: var(--bunny-text);
            border-bottom-left-radius: 5px;
        }

        /* Indicador de carga */
        #loading {
            display: none;
            padding: 10px;
            font-size: 0.85rem;
            color: var(--bunny-header);
            text-align: center;
            font-weight: bold;
            font-style: italic;
        }

        /* Área de entrada */
        .input-group {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 2px solid var(--bunny-border);
            gap: 10px;
            align-items: center;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid var(--bunny-border);
            border-radius: 25px;
            background: #fffafb;
            color: var(--bunny-text);
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--bunny-header); }

        button {
            background: var(--bunny-button);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover { 
            background: #ff858f; 
            transform: scale(1.05);
        }

        button:disabled { 
            background: #f8c6cc; 
            cursor: not-allowed;
        }

        /* Personalización de Scrollbar */
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-thumb { 
            background: var(--bunny-accent); 
            border-radius: 10px; 
        }

    </style>
</head>
<body>

<div id="chat-container">
    <header>BunyIA | Llama 3.3 70B 🥭</header>
    
    <div id="chat-window">
        <div class="message bot-msg">¡Hola, cariñito! 🌸 Mi sistema de zanahorias... ¡digo, de mangos! está listo. ¿Podrías llenar este pequeño formulario para empezar?</div>
    </div>

    <div id="loading">Dejame pensar con mi colita de algodón... 🐰💭</div>

    <div class="input-group">
        <input type="text" id="user-input" placeholder="Escribe un mensajito..." autocomplete="off">
        <button id="send-button">hasme preguntitas🐰💭</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendButton = document.getElementById('send-button');
    const loading = document.getElementById('loading');

    function appendMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', role === 'user' ? 'user-msg' : 'bot-msg');
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage('user', text);
        userInput.value = '';
        
        userInput.disabled = true;
        sendButton.disabled = true;
        loading.style.display = 'block';

        try {
            const response = await fetch("https://Yariagni-paolaia.hf.space/query", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: text })
            });

            const data = await response.json();
            appendMessage('bot', data.response);
            
        } catch (err) {
            appendMessage('bot', "Ups, hubo un error en la madriguera (conexión fallida). 🥕");
            console.error(err);
        } finally {
            userInput.disabled = false;
            sendButton.disabled = false;
            loading.style.display = 'none';
            userInput.focus();
        }
    }

    sendButton.onclick = sendMessage;
    userInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
</script>

</body>

</html>
