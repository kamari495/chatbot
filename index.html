<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat RAG - Llama 3.3</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }

        /* Contenedor principal */
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 20px auto;
            width: 95%;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Cabecera */
        header {
            background: #334155;
            padding: 15px 20px;
            text-align: center;
            font-weight: bold;
            border-bottom: 2px solid #475569;
        }

        /* Área de mensajes */
        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-msg {
            align-self: flex-end;
            background-color: #3b82f6;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .bot-msg {
            align-self: flex-start;
            background-color: #475569;
            color: #f1f5f9;
            border-bottom-left-radius: 2px;
        }

        /* Indicador de carga */
        #loading {
            display: none;
            padding: 10px;
            font-size: 0.85rem;
            color: #94a3b8;
            text-align: center;
        }

        /* Área de entrada */
        .input-group {
            display: flex;
            padding: 20px;
            background: #1e293b;
            border-top: 1px solid #334155;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #475569;
            border-radius: 8px;
            background: #0f172a;
            color: white;
            outline: none;
        }

        input:focus { border-color: #3b82f6; }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #2563eb; }
        button:disabled { background: #64748b; }

    </style>
</head>
<body>

<div id="chat-container">
    <header>AI Assistant | Llama 3.3 70B</header>
    
    <div id="chat-window">
        <div class="message bot-msg">Sistema listo. Los datos han sido cargados desde Drive. ¿Qué quieres saber?</div>
    </div>

    <div id="loading">Llama está procesando los documentos...</div>

    <div class="input-group">
        <input type="text" id="user-input" placeholder="Escribe tu pregunta..." autocomplete="off">
        <button id="send-button">Enviar</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendButton = document.getElementById('send-button');
    const loading = document.getElementById('loading');

    function appendMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', role === 'user' ? 'user-msg' : 'bot-msg');
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage('user', text);
        userInput.value = '';
        
        // Bloquear UI
        userInput.disabled = true;
        sendButton.disabled = true;
        loading.style.display = 'block';

        try {
            //#########################CAMBIAR ENLACE PARA EL CHAT########################//
            const response = await fetch("https://Yariagni-paolaia.hf.space/query", {
            //############################################################################//
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: text })
            });

            const data = await response.json();

            
            appendMessage('bot', data.response);
            
        } catch (err) {
            appendMessage('bot', "Error de conexión con la API.");
            console.error(err);
        } finally {
            userInput.disabled = false;
            sendButton.disabled = false;
            loading.style.display = 'none';
            userInput.focus();
        }
    }

    sendButton.onclick = sendMessage;
    userInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
</script>

</body>
</html>
